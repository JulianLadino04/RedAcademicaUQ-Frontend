<header class="main-header">
  <div class="header-container">

    <div class="brand-section">
      <a routerLink="/" class="brand-link">
        <img src="img\logo-red-academica-uq.png" alt="Logo Red Académica UQ" class="brand-logo">
        <span class="brand-title">{{ title }}</span>
      </a>
    </div>

    <nav class="nav-section">
      <ul class="nav-list">
        @for (link of navLinks; track link.route) {
          @if (puedeVer(link)) {
            <li class="nav-item">
              <a
                [routerLink]="link.route"
                routerLinkActive="active-link"
                [routerLinkActiveOptions]="{ exact: link.route === '/' }"
                class="nav-link">
                {{ link.label }}
              </a>
            </li>
          }
        }
      </ul>
    </nav>

    <div class="actions-section">
      @if (!isLogged) {
        <a routerLink="/login" class="btn btn-outline">Login</a>
        <a routerLink="/registro" class="btn btn-primary">Registro</a>
      } @else {
        <div class="user-box">
          <span class="welcome-text">Hola, {{ user }}</span>
          <span class="role-badge">{{ rol }}</span>
        </div>
        <button type="button" (click)="logout()" class="btn btn-primary">Logout</button>
      }
    </div>

  </div>
</header>
