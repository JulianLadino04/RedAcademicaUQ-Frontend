<div class="recovery-wrapper">
  <div class="recovery-card">

    <div class="recovery-header text-center">
      <div class="recovery-icon">
        <i class="fa-solid fa-key"></i>
      </div>
      <h2>Recuperar contraseña</h2>
      <p>
        Ingresa tu correo electrónico para recibir un código de verificación
      </p>
    </div>

    <form [formGroup]="recuperarForm" (ngSubmit)="recuperarPassword()" class="recovery-form">

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>

        <div class="input-group-custom">
          <span class="input-icon">
            <i class="fa-solid fa-envelope"></i>
          </span>

          <input
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="tu@email.com"
            [disabled]="cargando">
        </div>

        <div
          *ngIf="recuperarForm.get('email')?.invalid && recuperarForm.get('email')?.touched"
          class="validation-text">
          <span *ngIf="recuperarForm.get('email')?.errors?.['required']">
            El correo es obligatorio
          </span>
          <span *ngIf="recuperarForm.get('email')?.errors?.['email']">
            Ingresa un correo válido
          </span>
        </div>
      </div>

      <div class="button-group">
        <button
          type="submit"
          class="btn btn-send"
          [disabled]="recuperarForm.invalid || cargando">

          <span *ngIf="!cargando">
            <i class="fa-solid fa-paper-plane me-2"></i>
            Enviar código
          </span>

          <span *ngIf="cargando">
            <i class="fa-solid fa-spinner fa-spin me-2"></i>
            Enviando...
          </span>
        </button>

        <a routerLink="/login" class="btn btn-back">
          <i class="fa-solid fa-arrow-left me-2"></i>
          Volver al inicio de sesión
        </a>
      </div>

    </form>

  </div>
</div>
