<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg recuperar-password-card">

    <div class="card-body p-4">

      <h4 class="text-center mb-4">
        <i class="fa-solid fa-key me-2"></i>
        Recuperar Contraseña
      </h4>

      <p class="text-center text-muted mb-4">
        Ingresa tu correo electrónico para recibir un código de verificación
      </p>

      <form [formGroup]="recuperarForm" (ngSubmit)="recuperarPassword()">

        <div class="mb-4">
          <label class="form-label">Correo Electrónico</label>
          <input
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="tu@email.com"
            [disabled]="cargando">
          <div *ngIf="recuperarForm.get('email')?.invalid && recuperarForm.get('email')?.touched" class="text-danger small mt-1">
            <span *ngIf="recuperarForm.get('email')?.errors?.['required']">El correo es requerido</span>
            <span *ngIf="recuperarForm.get('email')?.errors?.['email']">Ingresa un correo válido</span>
          </div>
        </div>

        <div class="d-grid gap-2">
          <button
            type="submit"
            class="btn btn-primary btn-lg"
            [disabled]="recuperarForm.invalid || cargando">
            <span *ngIf="!cargando">
              <i class="fa-solid fa-paper-plane me-2"></i>
              Enviar Código
            </span>
            <span *ngIf="cargando">
              <i class="fa-solid fa-spinner fa-spin me-2"></i>
              Enviando...
            </span>
          </button>
          <a routerLink="/login" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-2"></i>
            Volver
          </a>
        </div>

      </form>

    </div>

  </div>

</div>
