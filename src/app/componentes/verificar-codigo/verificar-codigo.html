<div class="verify-wrapper">
  <div class="verify-card">

    <div class="verify-header text-center">
      <div class="verify-icon">
        <i class="fa-solid fa-shield-check"></i>
      </div>
      <h2>Verificar código</h2>
      <p>
        Hemos enviado un código de verificación a
      </p>
      <div class="email-badge">
        {{ email }}
      </div>
    </div>

    <form [formGroup]="codigoForm" (ngSubmit)="verificarCodigo()" class="verify-form">

      <div class="form-group">
        <label class="form-label">Código de verificación</label>

        <input
          type="text"
          class="form-control codigo-input"
          formControlName="codigo"
          placeholder="000000"
          maxlength="6"
          [disabled]="cargando"
          (input)="codigoForm.get('codigo')?.setValue(codigoForm.get('codigo')?.value.toUpperCase())">

        <div
          *ngIf="codigoForm.get('codigo')?.invalid && codigoForm.get('codigo')?.touched"
          class="validation-text">
          <span *ngIf="codigoForm.get('codigo')?.errors?.['required']">
            El código es obligatorio
          </span>
          <span *ngIf="codigoForm.get('codigo')?.errors?.['minlength']">
            El código debe tener 6 caracteres
          </span>
        </div>
      </div>

      <div class="button-group">
        <button
          type="submit"
          class="btn btn-verify"
          [disabled]="codigoForm.invalid || cargando">
          <span *ngIf="!cargando">
            <i class="fa-solid fa-check-circle me-2"></i>
            Verificar código
          </span>
          <span *ngIf="cargando">
            <i class="fa-solid fa-spinner fa-spin me-2"></i>
            Verificando...
          </span>
        </button>

        <button
          type="button"
          class="btn btn-resend"
          (click)="reenviarCodigo()"
          [disabled]="cargando">
          <i class="fa-solid fa-rotate-right me-2"></i>
          Reenviar código
        </button>

        <a routerLink="/recuperar-password" class="btn btn-back">
          <i class="fa-solid fa-arrow-left me-2"></i>
          Volver
        </a>
      </div>

    </form>
  </div>
</div>
